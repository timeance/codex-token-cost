name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs");

          const tag = process.env.RELEASE_TAG;
          const version = tag?.match(/^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/)?.[0]?.slice(1);
          if (!version) throw new Error(`Invalid release tag: ${tag}`);

          const source = fs.readFileSync("scripts/codex-live-token-cost.js", "utf8");
          const metadata = source.match(/@version\s+([^\r\n]+)/)?.[1]?.trim();
          const runtime = source.match(/const VERSION = "([^"]+)"/)?.[1];
          const readme = fs.readFileSync("README.md", "utf8");
          const readmeVersion = readme.match(/<code>v([^<]+)<\/code>/)?.[1];

          for (const [label, actual] of [["metadata", metadata], ["runtime", runtime], ["README", readmeVersion]]) {
            if (actual !== version) throw new Error(`${label} version ${actual} does not match ${version}`);
          }
          NODE
          node --check scripts/codex-live-token-cost.js
          git diff --check "${RELEASE_TAG}^" "$RELEASE_TAG"

      - name: Build release archive
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          archive="codex-token-cost-${RELEASE_TAG}.zip"
          git archive \
            --format=zip \
            --prefix="codex-token-cost-${RELEASE_TAG}/" \
            --output="$archive" \
            "$RELEASE_TAG" \
            README.md \
            docs/images \
            scripts/codex-live-token-cost.js \
            scripts/codex-local-usage-helper.cjs \
            scripts/deploy-userscript.ps1 \
            scripts/deploy-userscript.sh \
            scripts/start-helper.ps1 \
            scripts/start-helper.sh
          sha256sum "$archive" > "${archive}.sha256"
          unzip -l "$archive"
          cat "${archive}.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          archive="codex-token-cost-${RELEASE_TAG}.zip"
          gh release create "$RELEASE_TAG" "$archive" "${archive}.sha256" \
            --title "Codex Token Cost ${RELEASE_TAG}" \
            --generate-notes
